[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "kechol/homebrew-tap"
# Cargo features the released binary is built with. Mirrors the
# `default` set in `crates/cli/Cargo.toml` — kept explicit here so a
# future Cargo.toml `default = []` change does not silently strip
# language grammars from Homebrew / shell / cargo-dist artifacts.
features = [
    "lang-typescript",
    "lang-javascript",
    "lang-python",
    "lang-go",
    "lang-scala",
    "lang-rust",
]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Whether to install an updater program
install-updater = false
# Whether to enable GitHub Attestations
github-attestations = true
# Which actions to run on pull requests
pr-run-mode = "skip"
# Treat the CI workflow as hand-editable. cargo-dist's template emits
# unpinned action refs (`@v6`); our security review pins to commit SHAs.
# Without this, every release run aborts at `dist host` with
# "release.yml has out of date contents and needs to be regenerated".
allow-dirty = ["ci"]
