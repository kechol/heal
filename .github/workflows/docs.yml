name: Docs

# Build runs on `main` pushes (smoke-test that the static site still
# builds) and on `vX.Y.Z` tag pushes (release-time build that gets
# published). Pages deployment normally fires only for tag refs — the
# published docs site tracks tagged releases, not the rolling `main`
# branch. `workflow_dispatch` is a manual rebuild escape hatch with an
# optional `publish` input for emergency out-of-band deploys (off by
# default, i.e. dispatch builds without publishing). PRs do not run
# docs CI.
on:
  push:
    branches: [main]
    # Same shape as `release.yml`'s tag filter (strict `v` prefix,
    # X.Y.Z, optional prerelease / build suffix) so the docs site
    # publishes alongside every release the release workflow ships.
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Pages (emergency manual deploy; off by default).'
        type: boolean
        default: false

permissions:
  contents: read

# A single in-flight Pages deployment at a time, but never cancel a deploy
# that is already publishing — that can leave the site in a half-replaced
# state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: npm run format:check
        working-directory: docs
      - run: npm run build
        working-directory: docs
      # Pages artifact upload runs only when this build will be
      # published — tag refs, or a workflow_dispatch with publish=true.
      # main pushes stop after `npm run build` (smoke test).
      - if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: deploy
    # Publish for vX.Y.Z tag pushes, or for a workflow_dispatch run
    # with `publish=true` (emergency manual deploy). main pushes
    # build but never deploy.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
