version: 2

updates:
  # Cargo crates — keeps third-party Rust deps current and surfaces
  # security advisories as PRs that the cargo-deny CI gate will validate.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Roll routine patch / minor bumps into one PR to reduce noise.
      patch-and-minor:
        update-types:
          - patch
          - minor

  # GitHub Actions — keeps the SHA-pinned action references fresh.
  # Without this, the SHA pins in ci.yml / release.yml would silently
  # drift behind upstream security and feature releases.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # npm — Astro / Starlight stack for the docs site under docs/.
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      # Hold typescript on the 5.x line: @astrojs/check@0.9.x declares
      # `peer typescript: ^5.0.0`, and our docs surface is one 7-line
      # content collection — no upside to running outside the supported
      # range. Drop this entry once @astrojs/check ships TS 6 support.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
